# Railway.toml — https://docs.railway.app/reference/config-as-code
# Connect this repo in Railway, attach a Volume, and it will run the
# Dockerfile above with a persistent disk mounted at /workspace/data.
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# NOTE: no `startCommand` here on purpose. Railway runs startCommand in
# exec form (no shell), so `$PORT` would be passed to uvicorn literally
# and crash with `'$PORT' is not a valid integer`. Instead we let the
# Dockerfile CMD (which uses exec form `["sh", "-c", "...${PORT}..."]`)
# handle startup — that one DOES go through a shell.
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Per-service volume: size in GB. The default service `api` automatically
# inherits; create the volume in the Railway UI and mount it on /workspace/data.
[[volumes]]
name = "tcpa-data"
mountPath = "/workspace/data"
